<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ІТ-коледж ХАІ — корисні посилання</title>
  <meta name="description" content="Швидкий доступ до ресурсів ІТ-коледжу ХАІ: Telegram-група, сайт коледжу та Google-форма." />
  <style>
    :root {
      --bg: #4a74ac;
      --bg-dark: #355b8f;
      --bg-deep: #27486f;
      --surface: rgba(255, 255, 255, 0.12);
      --surface-strong: rgba(255, 255, 255, 0.18);
      --border: rgba(255, 255, 255, 0.22);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.82);
      --shadow: 0 24px 60px rgba(18, 35, 61, 0.30);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.10), transparent 26%),
        linear-gradient(145deg, var(--bg) 0%, var(--bg-dark) 52%, var(--bg-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(16px);
      opacity: 0.55;
      z-index: 0;
    }

    body::before {
      width: 220px;
      height: 220px;
      top: -60px;
      left: -70px;
      background: rgba(255,255,255,0.13);
    }

    body::after {
      width: 260px;
      height: 260px;
      right: -80px;
      bottom: -90px;
      background: rgba(255,255,255,0.08);
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 28px 22px 22px;
    }

    .card::before {
      content: "";
      position: absolute;
      top: -120px;
      left: -80px;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%);
      pointer-events: none;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 0px;
    }

    .logo {
      width: min(100%, 360px);
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 18px rgba(16, 30, 53, 0.18));
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: clamp(26px, 4.6vw, 40px);
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 12px auto 24px;
      max-width: 420px;
      text-align: center;
      font-size: clamp(15px, 2.6vw, 18px);
      line-height: 1.55;
      color: var(--muted);
    }

    .links {
      display: grid;
      gap: 14px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
      padding: 17px 18px;
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      background: linear-gradient(135deg, rgba(255,255,255,0.20), rgba(255,255,255,0.10));
      border: 1px solid rgba(255,255,255,0.20);
      box-shadow: 0 12px 25px rgba(19, 39, 68, 0.16);
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, rgba(255,255,255,0.26), rgba(255,255,255,0.14));
      box-shadow: 0 16px 30px rgba(19, 39, 68, 0.22);
      border-color: rgba(255,255,255,0.30);
    }

    .link-btn:focus-visible {
      outline: 3px solid rgba(255,255,255,0.55);
      outline-offset: 2px;
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .icon {
      flex: 0 0 46px;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 22px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .text-block {
      min-width: 0;
    }

    .text-block strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 700;
    }

    .text-block span {
      display: block;
      margin-top: 3px;
      font-size: 13px;
      line-height: 1.35;
      color: rgba(255,255,255,0.76);
    }

    .arrow {
      flex: 0 0 auto;
      font-size: 24px;
      line-height: 1;
      opacity: 0.92;
    }

    .note {
      margin-top: 18px;
      padding-top: 16px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      border-top: 1px solid rgba(255,255,255,0.14);
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 22px 16px 18px;
        border-radius: 22px;
      }

      .logo {
        width: min(100%, 180px);
      }

      .link-btn {
        padding: 15px 14px;
        border-radius: 16px;
      }

      .icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        font-size: 20px;
      }

      .text-block strong {
        font-size: 16px;
      }

      .text-block span {
        font-size: 12px;
      }
    }

    @media (min-width: 900px) {
      .card {
        padding: 34px 28px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <main class="card">
      <div class="logo-wrap">
        <img class="logo" src="assets/logo-tone.png" alt="Логотип ІТ-коледжу ХАІ" />
      </div>

      <h1>Посилання</h1>
      <p class="subtitle">
        Оберіть потрібний ресурс для швидкого переходу зі сторінки QR-коду.
      </p>

      <section class="links" aria-label="Основні посилання">
        <a class="link-btn" href="https://t.me/+RmvMxpct1-I2ZjYy" target="_blank" rel="noopener noreferrer">
          <div class="btn-left">
            <div class="icon" aria-hidden="true">✈️</div>
            <div class="text-block">
              <strong>Група Telegram</strong>
              <span>Швидкий перехід до спільноти</span>
            </div>
          </div>
          <div class="arrow" aria-hidden="true">→</div>
        </a>

        <a class="link-btn" href="https://it-college.khai.edu/" target="_blank" rel="noopener noreferrer">
          <div class="btn-left">
            <div class="icon" aria-hidden="true">🌐</div>
            <div class="text-block">
              <strong>Сайт коледжу</strong>
              <span>Офіційна сторінка ІТ-коледжу ХАІ</span>
            </div>
          </div>
          <div class="arrow" aria-hidden="true">→</div>
        </a>

        <a class="link-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeqnvrJRAiFPaZMbhlZ8L5sJKOz-eXWveyUlzqbeEqBSk06MA/viewform" target="_blank" rel="noopener noreferrer">
          <div class="btn-left">
            <div class="icon" aria-hidden="true">📝</div>
            <div class="text-block">
              <strong>Google-форма</strong>
              <span>Заповнення форми онлайн</span>
            </div>
          </div>
          <div class="arrow" aria-hidden="true">→</div>
        </a>
      </section>


    </main>
  </div>
</body>
</html>
